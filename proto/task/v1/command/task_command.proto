syntax = "proto3";

package task.v1.command;

import "google/protobuf/timestamp.proto";
import "task/v1/common/task.proto";

option go_package = "github.com/rinrinkurukuru/task-management-app-proto/gen/task/v1/command;commandpb";

// タスクの作成・更新・削除を担うコマンド側サービス
service TaskCommandService {
  // タスクを新規作成する
  rpc Create(CreateRequest) returns (CreateResponse);

  // タスクを別カラム/別ポジションへ移動する
  rpc Move(MoveRequest) returns (MoveResponse);

  // タスクのタイトル/説明/優先度を編集する
  rpc Edit(EditRequest) returns (EditResponse);

  // タスクを削除する
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

// ---------- Create ----------

message CreateRequest {
  int32 user_id = 1;
  string title = 2;
  string description = 3;
  // priority 未指定時は medium が採用される（サーバー側のデフォルト）
  task.v1.common.Priority priority = 4;
  // column が COLUMN_DATE の場合のみ scheduled_date を必須で参照する
  task.v1.common.Column column = 5;
  optional google.protobuf.Timestamp scheduled_date = 6;
}

message CreateResponse {
  task.v1.common.Task task = 1;
}

// ---------- Move ----------

message MoveRequest {
  string id = 1;
  task.v1.common.Column column = 2;
  // column が COLUMN_DATE の場合のみ scheduled_date を必須で参照する
  optional google.protobuf.Timestamp scheduled_date = 3;
  // position 未指定時はカラム末尾に配置される
  optional int32 position = 4;
}

message MoveResponse {
  task.v1.common.Task task = 1;
}

// ---------- Edit ----------

// EditRequest は部分更新のリクエスト
// 空文字 / PRIORITY_UNSPECIFIED のフィールドは更新対象外
message EditRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  task.v1.common.Priority priority = 4;
}

message EditResponse {
  task.v1.common.Task task = 1;
}

// ---------- DeleteTask ----------

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {}
