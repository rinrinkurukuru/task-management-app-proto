syntax = "proto3";

package task.v1.query;

import "google/protobuf/timestamp.proto";
import "task/v1/common/task.proto";

option go_package = "task-management-app/protobuf/gen/task/v1/query;querypb";

// タスクの読み取り専用サービス
service QueryService {
  // List はタスク一覧を取得する
  // date 未指定 → ユーザーの全タスク
  // date 指定   → その日付を含む週のタスク
  rpc List(ListRequest) returns (ListResponse);

  // タスクを 1 件取得する
  rpc Get(GetRequest) returns (GetResponse);
}

// ---------- List ----------

message ListRequest {
  int32 user_id = 1;
  // date 指定時は当該日付を含む週（月〜日 等の実装側ルール）のタスクのみ返す
  optional google.protobuf.Timestamp date = 2;
}

message ListResponse {
  repeated task.v1.common.Task tasks = 1;
}

// ---------- Get ----------

message GetRequest {
  int32 id = 1;
}

message GetResponse {
  task.v1.common.Task task = 1;
}
