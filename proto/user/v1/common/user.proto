syntax = "proto3";

package user.v1.common;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/rinrinkurukuru/task-management-app-proto/gen/user/v1/common;commonpb";

// User はユーザーの共通表現
//
// command サービスのレスポンス、query サービスのレスポンス共通で使用する。
// password_hash や deleted_at などサーバ側で完結すべき値はここに含めない。
message User {
  // 自動採番された ID（DB の app_user.id に対応）
  int32 id = 1;
  // ログインID（一意）
  string login_id = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
}
